<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
            overflow-x: hidden;
        }
        h1 {
            font-size: 3.5rem;
            margin-top: 80px;
            color: white;
            text-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.3rem;
            color: white;
            margin-top: -15px;
        }
        .balloon {
            position: absolute;
            bottom: -150px;
            animation: float 6s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-200px); }
            100% { transform: translateY(0); }
        }
        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 25px;
            font-size: 1.2rem;
            color: white;
            background: #ff6b81;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #ff4757;
        }
        .message-box {
            margin-top: 40px;
            font-size: 1.8rem;
            color: #fff;
            font-weight: bold;
            display: none;
        }
        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>🎉 Happy Birthday! 🎂</h1>
    <p>Wishing you a day full of happiness and surprises!</p>

    <img src="https://i.imgur.com/3ZQ3ZKf.png" class="balloon" style="left: 10%; animation-delay: 0s;" />
    <img src="https://i.imgur.com/3ZQ3ZKf.png" class="balloon" style="left: 40%; animation-delay: 2s;" />
    <img src="https://i.imgur.com/3ZQ3ZKf.png" class="balloon" style="left: 70%; animation-delay: 1s;" />

    <div class="btn" onclick="showMessage()">Click for Surprise 🎁</div>

    <div class="message-box" id="msg">💖 May this year bring you joy, success, and endless smiles! 🎉</div>

    <script>
        function showMessage() {
            document.getElementById('msg').style.display = 'block';
        }
    </script>
    <canvas id="confetti-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function showMessage() {
            document.getElementById('msg').style.display = 'block';
            startConfetti();
        }

        function startConfetti() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            })();
        }
    </script>
</body>
</html>
